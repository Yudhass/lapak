<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="canonical" href="https://lapak.yudha.top/login.html" />
    <meta property="og:title" content="Login — Lapak Yudhas" />
    <meta property="og:description"
        content="Masuk ke akun Lapak Yudhas untuk pengalaman belanja dan jualan yang lebih mudah, aman, dan nyaman." />

    <meta name="twitter:title" content="Login — Lapak Yudhas" />

        content="Masuk ke akun Lapak Yudhas untuk pengalaman belanja dan jualan yang lebih mudah, aman, dan nyaman." />

    <meta name="google-site-verification" content="uHY-s2DiAc7NLhuPk8gD42lr_lMwQIEANSEzCra6iUM" />

        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="shortcut icon" href="img/lapak.png" type="image/x-icon">
    <style>
        :root {
            --brand: #4F46E5;
            --brand-dark: #312E81;
            --brand-deeper: #1E1B4B;
            --accent: #F59E0B;
            --success: #10B981;
            --danger: #EF4444;
            --border: #E2E8F0;
            --text-1: #0F172A;
            --text-2: #475569;
            --text-3: #94A3B8;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--brand-deeper) 0%, var(--brand-dark) 50%, #4338CA 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
        }

        /* decorative blobs */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            background:
                radial-gradient(ellipse at 10% 20%, rgba(99, 102, 241, .4) 0%, transparent 50%),
                radial-gradient(ellipse at 90% 80%, rgba(245, 158, 11, .2) 0%, transparent 45%);
        }

        /* Card */
        .card {
            position: relative;
            z-index: 1;
            background: #fff;
            border-radius: 24px;
            width: 100%;
            max-width: 440px;
            padding: 2.75rem 2.5rem;
            box-shadow: 0 24px 64px rgba(0, 0, 0, .22);
        }

        /* Logo row */
        .logo {
            display: flex;
            align-items: center;
            gap: .6rem;
            margin-bottom: 2rem;
        }

        .logo-box {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--brand), var(--accent));
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .logo-name {
            font-weight: 800;
            font-size: 1.15rem;
            color: var(--text-1);
        }

        /* Headings */
        h1 {
            font-size: 1.65rem;
            font-weight: 800;
            letter-spacing: -.03em;
            color: var(--text-1);
            margin-bottom: .35rem;
        }

        .sub {
            color: var(--text-2);
            font-size: .9rem;
            margin-bottom: 1.75rem;
        }

        /* Alerts */
        .alert {
            display: none;
            align-items: flex-start;
            gap: .55rem;
            padding: .75rem 1rem;
            border-radius: 10px;
            font-size: .84rem;
            font-weight: 500;
            margin-bottom: 1.1rem;
        }

        .alert.show {
            display: flex;
        }

        .alert.error {
            background: #FEE2E2;
            color: #B91C1C;
        }

        .alert.success {
            background: #DCFCE7;
            color: #15803D;
        }

        .alert i {
            flex-shrink: 0;
            margin-top: 1px;
        }

        /* Fields */
        .field {
            margin-bottom: 1.1rem;
        }

        label {
            display: block;
            font-size: .84rem;
            font-weight: 600;
            color: var(--text-1);
            margin-bottom: .4rem;
        }

        .inp-wrap {
            position: relative;
        }

        .inp-wrap>i.field-ico {
            position: absolute;
            left: .9rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-3);
            font-size: .95rem;
            pointer-events: none;
        }

        input[type="email"],
        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: .72rem 1rem .72rem 2.6rem;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            font-size: .92rem;
            font-family: inherit;
            color: var(--text-1);
            transition: border-color .2s, box-shadow .2s;
            outline: none;
            background: #fff;
        }

        input:focus {
            border-color: var(--brand);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, .12);
        }

        .eye-btn {
            position: absolute;
            right: .85rem;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
            color: var(--text-3);
            font-size: 1rem;
            line-height: 1;
        }

        .eye-btn:hover {
            color: var(--brand);
        }

        /* Submit button */
        .btn-submit {
            width: 100%;
            padding: .82rem;
            margin-top: .4rem;
            background: var(--brand);
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            font-family: inherit;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: background .2s, transform .15s, box-shadow .2s;
            box-shadow: 0 6px 20px rgba(79, 70, 229, .3);
        }

        .btn-submit:hover:not(:disabled) {
            background: var(--brand-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(79, 70, 229, .4);
        }

        .btn-submit:disabled {
            opacity: .65;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Divider */
        .divider {
            text-align: center;
            color: var(--text-3);
            font-size: .8rem;
            margin: 1.2rem 0;
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: calc(50% - 24px);
            height: 1px;
            background: var(--border);
        }

        .divider::before {
            left: 0;
        }

        .divider::after {
            right: 0;
        }

        /* Register link button */
        .btn-outline {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: .45rem;
            width: 100%;
            padding: .78rem;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            background: none;
            cursor: pointer;
            font-family: inherit;
            font-size: .92rem;
            font-weight: 600;
            color: var(--text-1);
            text-decoration: none;
            transition: border-color .2s, background .2s, color .2s;
        }

        .btn-outline:hover {
            border-color: var(--brand);
            background: #EDE9FE;
            color: var(--brand);
        }

        /* Footer text */
        .ft-note {
            text-align: center;
            color: var(--text-3);
            font-size: .78rem;
            margin-top: 1.5rem;
        }

        .ft-note a {
            color: var(--brand);
            font-weight: 600;
            text-decoration: none;
        }

        .ft-note a:hover {
            text-decoration: underline;
        }

        /* Spinner inline */
        .spin {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2.5px solid rgba(255, 255, 255, .35);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spn .65s linear infinite;
            vertical-align: -3px;
            margin-right: .35rem;
        }

        @keyframes spn {
            to {
                transform: rotate(360deg);
            }
        }

        /* Page loader overlay */
        #pgLoader {
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, .7);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }

        #pgLoader.show {
            display: flex;
        }

        .ld-ring {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            border: 4px solid rgba(79, 70, 229, .15);
            border-top-color: var(--brand);
            animation: spn .7s linear infinite;
        }

        /* Guest browse link */
        .guest-link {
            display: block;
            text-align: center;
            margin-top: 1rem;
            color: var(--text-3);
            font-size: .82rem;
            text-decoration: none;
        }

        .guest-link:hover {
            color: var(--brand);
        }
    </style>
</head>

<body>

    <div id="pgLoader">
        <div class="ld-ring"></div>
    </div>

    <div class="card">
        <!-- Logo -->
        <div class="logo">
            <div class="logo-box"><i class="bi bi-bag-heart-fill"></i></div>
            <span class="logo-name">Lapak Yudhas</span>
        </div>

        <h1>Selamat Datang</h1>
        <p class="sub">Masuk ke akun Anda untuk melanjutkan</p>

        <!-- Alerts -->
        <div class="alert error" id="alertErr">
            <i class="bi bi-x-circle-fill"></i>
            <span id="alertErrMsg"></span>
        </div>
        <div class="alert success" id="alertOk">
            <i class="bi bi-check-circle-fill"></i>
            <span id="alertOkMsg"></span>
        </div>

        <!-- Form -->
        <form id="form" onsubmit="handleLogin(event)" novalidate>
            <div class="field">
                <label for="email">Email</label>
                <div class="inp-wrap">
                    <i class="bi bi-envelope field-ico"></i>
                    <input type="email" id="email" placeholder="email@contoh.com" required autocomplete="email" />
                </div>
            </div>
            <div class="field">
                <label for="password">Password</label>
                <div class="inp-wrap">
                    <i class="bi bi-lock field-ico"></i>
                    <input type="password" id="password" placeholder="Masukkan password" required
                        autocomplete="current-password" />
                    <button type="button" class="eye-btn" onclick="togglePw(this)">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn-submit" id="btnLogin">Masuk</button>
        </form>

        <div class="divider">atau</div>

        <!-- <a id="btnRegister" href="#" class="btn-outline">
            <i class="bi bi-person-plus"></i>Daftar Akun Baru
        </a> -->

        <a id="btnGuest" href="#" class="guest-link">
            Lanjutkan tanpa login <i class="bi bi-arrow-right ms-1"></i>
        </a>

        <p class="ft-note">Dengan masuk, Anda menyetujui <a href="#">Syarat &amp; Ketentuan</a> kami.</p>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbyb9NghBypjpt17FT6MlIAJsZvXNoa4OniIJ47kPNYicmhqAS-6kaWWN8VPHcbky4L9/exec';

        async function api(action, payload = {}, tkn) {
            const token = tkn !== undefined ? tkn : sessionStorage.getItem('auth_token');
            const res = await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({ action, token, payload }),
            });
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const json = await res.json();
            if (!('success' in json)) json.success = json.status === 'success';
            return json;
        }

        // Set register / guest links
        // document.getElementById('btnRegister').href = 'register.html';
        document.getElementById('btnGuest').href = 'index.html';

        // If already authenticated, redirect straight to app
        const existingToken = sessionStorage.getItem('auth_token');
        if (existingToken) {
            api('validateSession', {}, existingToken).then(res => {
                if (res.success) {
                    document.getElementById('pgLoader').classList.add('show');
                    window.location.href = 'index.html';
                } else {
                    sessionStorage.removeItem('auth_token');
                    sessionStorage.removeItem('auth_user');
                }
            }).catch(() => {
                sessionStorage.removeItem('auth_token');
                sessionStorage.removeItem('auth_user');
            });
        }

        function togglePw(btn) {
            const inp = btn.closest('.inp-wrap').querySelector('input');
            const show = inp.type === 'password';
            inp.type = show ? 'text' : 'password';
            btn.querySelector('i').className = show ? 'bi bi-eye-slash' : 'bi bi-eye';
        }

        function showErr(msg) {
            document.getElementById('alertErrMsg').textContent = msg;
            document.getElementById('alertErr').classList.add('show');
            document.getElementById('alertOk').classList.remove('show');
        }
        function showOk(msg) {
            document.getElementById('alertOkMsg').textContent = msg;
            document.getElementById('alertOk').classList.add('show');
            document.getElementById('alertErr').classList.remove('show');
        }

        function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('btnLogin');
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email) { showErr('Masukkan email Anda.'); return; }
            if (!password) { showErr('Masukkan password Anda.'); return; }

            btn.disabled = true;
            btn.innerHTML = '<span class="spin"></span>Memproses…';
            document.getElementById('alertErr').classList.remove('show');

            api('loginUser', { email, password }, null).then(res => {
                btn.disabled = false;
                btn.innerHTML = 'Masuk';
                if (!res.success) { showErr(res.message); return; }

                sessionStorage.setItem('auth_token', res.data.token);
                sessionStorage.setItem('auth_user', JSON.stringify(res.data.user));

                showOk('Login berhasil! Mengalihkan…');
                document.getElementById('pgLoader').classList.add('show');

                // Route berdasarkan role pengguna
                const userRole = res.data.user.Role;
                const redirectUrl = userRole === 'admin' ? 'admin.html' : 'index.html';

                setTimeout(() => { window.location.href = redirectUrl; }, 600);
            }).catch(() => {
                btn.disabled = false;
                btn.innerHTML = 'Masuk';
                showErr('Terjadi kesalahan koneksi. Coba lagi.');
            });
        }
    </script>

</body>
